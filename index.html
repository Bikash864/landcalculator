<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kumar Law Associates | Land Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}

/* HEADER */
.header {
    width: 100%;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: linear-gradient(135deg,#22c55e,#3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
}

.profile img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #22c55e;
}

/* TOOLBAR */
.toolbar {
    display: flex;
    width: 100%;
    background: #020617;
}

.toolbar button {
    flex: 1;
    padding: 12px;
    border: none;
    color: white;
    background: #1e293b;
    font-size: 14px;
    cursor: pointer;
}

.toolbar button.active {
    background: #22c55e;
}

/* CONTENT */
.content {
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    max-width: 420px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ENTRY */
.entry {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 10px;
}

/* LABEL + INPUT FIX */
.field {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

label {
    font-size: 11px;
    color: #666;
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    text-align: center;
}

/* DELETE */
.delete {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
}

.add-btn {
    background: #22c55e;
    color: white;
}

.clear-btn {
    background: #ef4444;
    color: white;
}

/* RESULT */
.result {
    text-align: center;
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 13px;
    color: #64748b;
    margin: 20px 0;
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">
        <div class="logo">⚖️</div>
        <h3>Kumar Law Associates</h3>
    </div>
    <div class="profile">
        <img src="./images/photo.jpg" onerror="this.src='https://i.pravatar.cc/150'">
    </div>
</div>

<div class="toolbar">
    <button class="active" onclick="switchMode('add', this)">Add Land</button>
    <button onclick="switchMode('sub', this)">Subtract Land</button>
</div>

<div class="content">

<div class="card">

<h3 id="modeTitle">Add Land</h3>

<div id="rows"></div>

<button class="btn add-btn" onclick="addRow()">Add Data</button>
<button class="btn clear-btn" onclick="clearRows()">Clear Data</button>

</div>

<div class="result" id="result">Total: 0 B | 0 K | 0 L</div>

</div>

<div class="footer">
All rights reserved to Kumar Law Associates
</div>

<script>

let mode = "add";

/* ✅ FINAL CORRECT SYSTEM */
function toLecha(b,k,l){
    return (b * 100) + (k * 20) + l;
}

function fromLecha(t){
    let b = Math.floor(t / 100);
    t %= 100;
    let k = Math.floor(t / 20);
    let l = t % 20;
    return {b,k,l};
}

function updateTotal(){
    let total = 0;

    document.querySelectorAll(".entry").forEach(e => {

        let b = +e.querySelector(".b").value || 0;
        let k = +e.querySelector(".k").value || 0;
        let l = +e.querySelector(".l").value || 0;

        let val = toLecha(b,k,l);

        total += (mode === "add") ? val : -val;
    });

    let res = document.getElementById("result");

    if(total < 0){
        res.innerText = "Invalid (negative land)";
        return;
    }

    let r = fromLecha(total);
    res.innerText = `Total: ${r.b} B | ${r.k} K | ${r.l} L`;
}

function addRow(){
    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
        <div class="field">
            <label>Bigha</label>
            <input class="b" type="number" value="0">
        </div>

        <div class="field">
            <label>Katha</label>
            <input class="k" type="number" value="0">
        </div>

        <div class="field">
            <label>Lessa</label>
            <input class="l" type="number" value="0">
        </div>

        <button class="delete">×</button>
    `;

    div.querySelectorAll("input").forEach(i=>{
        i.addEventListener("input", updateTotal);
    });

    div.querySelector(".delete").onclick = () => {
        div.remove();
        updateTotal();
    };

    document.getElementById("rows").appendChild(div);
}

function clearRows(){
    document.getElementById("rows").innerHTML = "";
    addRow();
    updateTotal();
}

function switchMode(m,el){
    mode = m;

    document.querySelectorAll(".toolbar button")
        .forEach(b => b.classList.remove("active"));

    el.classList.add("active");

    document.getElementById("modeTitle").innerText =
        (m === "add") ? "Add Land" : "Subtract Land";

    clearRows();
}

addRow();

/* PWA */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log(err));
}

</script>

</body>
</html>
