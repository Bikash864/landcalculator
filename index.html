<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kumar Law Associates | Land Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: linear-gradient(135deg,#22c55e,#3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
}

.profile img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #22c55e;
}

/* MENU */
.sidebar {
    display: flex;
    background: #020617;
    padding: 8px;
}

.menu-item {
    flex: 1;
    margin: 4px;
    padding: 10px;
    background: #1e293b;
    color: white;
    text-align: center;
    border-radius: 8px;
}

.menu-item.active {
    background: #22c55e;
}

/* CONTENT */
.content {
    padding: 12px;
}

.card {
    background: white;
    padding: 12px;
    border-radius: 10px;
}

/* ROW */
.row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 8px;
}

input {
    padding: 10px;
    text-align: center;
}

@media (max-width:500px){
    .row { grid-template-columns: 1fr 1fr; }
    .remove { grid-column: span 2; }
}

button {
    padding: 12px;
    border: none;
    border-radius: 6px;
}

.add-btn { background:#22c55e; color:white; }
.clear-btn { background:#f59e0b; color:white; }
.remove { background:red; color:white; }

.result {
    text-align: center;
    font-weight: bold;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">
        <div class="logo">⚖️</div>
        <h3>Kumar Law Associates</h3>
    </div>
    <div class="profile">
        <img src="./images/photo.jpg" onerror="this.src='https://i.pravatar.cc/150'">
    </div>
</div>

<div class="sidebar">
    <div class="menu-item active" onclick="switchMode('add',this)">Add</div>
    <div class="menu-item" onclick="switchMode('sub',this)">Subtract</div>
</div>

<div class="content">

<div class="card">
<h3 id="modeTitle">Add Land</h3>
<div id="rows"></div>

<button class="add-btn" onclick="addRow()">Add</button>
<button class="clear-btn" onclick="clearRows()">Clear</button>
</div>

<div class="result" id="result">Total: 0 B | 0 K | 0 L</div>

</div>

<script>
let mode="add";

function toLecha(b,k,l){ return b*100+k*20+l; }

function fromLecha(t){
 let b=Math.floor(t/100); t%=100;
 let k=Math.floor(t/20);
 let l=t%20;
 return {b,k,l};
}

function updateTotal(){
 let total=0;
 document.querySelectorAll(".row").forEach(r=>{
  let val=toLecha(
   +r.querySelector(".b").value||0,
   +r.querySelector(".k").value||0,
   +r.querySelector(".l").value||0
  );
  total+=(mode==="add")?val:-val;
 });

 let res=document.getElementById("result");

 if(total<0){ res.innerText="Invalid"; return; }

 let r=fromLecha(total);
 res.innerText=`Total: ${r.b} B | ${r.k} K | ${r.l} L`;
}

function addRow(){
 let row=document.createElement("div");
 row.className="row";

 row.innerHTML=`
 <input type="number" class="b" placeholder="B">
 <input type="number" class="k" placeholder="K">
 <input type="number" class="l" placeholder="L">
 <button class="remove">×</button>`;

 row.querySelectorAll("input").forEach(i=>{
  i.oninput=updateTotal;
 });

 row.querySelector(".remove").onclick=()=>{
  row.remove(); updateTotal();
 };

 document.getElementById("rows").appendChild(row);
}

function clearRows(){
 document.getElementById("rows").innerHTML="";
 addRow(); updateTotal();
}

function switchMode(m,el){
 mode=m;
 document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
 el.classList.add("active");
 document.getElementById("modeTitle").innerText=(m==="add")?"Add Land":"Subtract Land";
 clearRows();
}

addRow();

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
