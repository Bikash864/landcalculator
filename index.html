<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kumar Law Associates | Land Calculator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}

/* TOP HEADER (FULL WIDTH FIXED) */
.header {
    width: 100%;
    box-sizing: border-box;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg,#22c55e,#3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
}

.profile img {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid #22c55e;
}

/* SECOND TOOLBAR */
.toolbar {
    width: 100%;
    display: flex;
    background: #020617;
}

.toolbar button {
    flex: 1;
    padding: 12px;
    border: none;
    color: white;
    background: #1e293b;
    cursor: pointer;
}

.toolbar button.active {
    background: #22c55e;
}

/* MAIN CONTENT */
.content {
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    max-width: 450px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ROW (B K L ONLY) */
.row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}

input {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    text-align: center;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

.add-btn {
    background: #22c55e;
    color: white;
}

.clear-btn {
    background: #ef4444;
    color: white;
}

/* RESULT */
.result {
    margin-top: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 13px;
    color: #64748b;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="brand">
        <div class="logo">⚖️</div>
        <h3>Kumar Law Associates</h3>
    </div>
    <div class="profile">
        <img src="./images/photo.jpg" onerror="this.src='https://i.pravatar.cc/150'">
    </div>
</div>

<!-- SECOND TOOLBAR -->
<div class="toolbar">
    <button class="active" onclick="switchMode('add', this)">Add Land</button>
    <button onclick="switchMode('sub', this)">Subtract Land</button>
</div>

<!-- CONTENT -->
<div class="content">

<div class="card">

<h3 id="modeTitle">Add Land</h3>

<div id="rows"></div>

<button class="btn add-btn" onclick="addRow()">Add Data</button>

<button class="btn clear-btn" onclick="clearRows()">Clear Data</button>

</div>

<div class="result" id="result">Total: 0 B | 0 K | 0 L</div>

</div>

<div class="footer">
All rights reserved to Kumar Law Associates
</div>

<script>
let mode="add";

function toLecha(b,k,l){ return b*100+k*20+l; }

function fromLecha(t){
 let b=Math.floor(t/100); t%=100;
 let k=Math.floor(t/20);
 let l=t%20;
 return {b,k,l};
}

function updateTotal(){
 let total=0;

 document.querySelectorAll(".row").forEach(r=>{
  let val=toLecha(
   +r.querySelector(".b").value||0,
   +r.querySelector(".k").value||0,
   +r.querySelector(".l").value||0
  );
  total+=(mode==="add")?val:-val;
 });

 let res=document.getElementById("result");

 if(total<0){ res.innerText="Invalid"; return; }

 let r=fromLecha(total);
 res.innerText=`Total: ${r.b} B | ${r.k} K | ${r.l} L`;
}

function addRow(){
 let row=document.createElement("div");
 row.className="row";

 row.innerHTML=`
 <input type="number" class="b" placeholder="B">
 <input type="number" class="k" placeholder="K">
 <input type="number" class="l" placeholder="L">`;

 row.querySelectorAll("input").forEach(i=>{
  i.oninput=updateTotal;
 });

 document.getElementById("rows").appendChild(row);
}

function clearRows(){
 document.getElementById("rows").innerHTML="";
 addRow();
 updateTotal();
}

function switchMode(m,el){
 mode=m;

 document.querySelectorAll(".toolbar button").forEach(b=>b.classList.remove("active"));
 el.classList.add("active");

 document.getElementById("modeTitle").innerText =
  (m==="add") ? "Add Land" : "Subtract Land";

 clearRows();
}

addRow();
</script>

</body>
</html>
